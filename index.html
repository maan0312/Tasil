<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natiijada - Al-Ta'sil Institute</title>
    <style>
        :root {
            --primary-color: #1a5928;
            --bg-body: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border-top: 6px solid var(--primary-color);
        }

        .school-logo {
            width: 100px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        input {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-color); }

        .btn-view {
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        #result-display {
            display: none;
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        .certificate-img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            border: 1px solid #333;
        }

        .btn-back {
            margin-top: 20px;
            padding: 10px 25px;
            background: #d9534f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-box" id="loginArea">
        <img src="https://cdn-icons-png.flaticon.com/512/5322/5322033.png" alt="Logo" class="school-logo">
        <h2>Hubi Natiijada</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Geli ID-ga iyo Password-kaaga.</p>
        
        <div class="input-group">
            <input type="text" id="stuID" placeholder="ID-ga Ardayga">
            <input type="password" id="stuPass" placeholder="Password-ka">
            <button class="btn-view" onclick="showCertificate()">Raadi Natiijada</button>
        </div>
    </div>

    <div id="result-display">
        <img src="" id="certImage" class="certificate-img" alt="Certificate">
        <br>
        <button class="btn-back" onclick="location.reload()">Ka bax (Logout)</button>
    </div>

    <script>
        // Xogta 5-ta Arday
        const students = {
            "20241": {
                pass: "pass1",
                imgUrl: "1.jpg" 
            },
            "20242": {
                pass: "pass2",
                imgUrl: "1.jpg"
            },
            "20243": {
                pass: "pass3",
                imgUrl: "https://via.placeholder.com/800x1100?text=Student+3+Certificate"
            },
            "20244": {
                pass: "pass4",
                imgUrl: "https://via.placeholder.com/800x1100?text=Student+4+Certificate"
            },
            "20245": {
                pass: "pass5",
                imgUrl: "https://via.placeholder.com/800x1100?text=Student+5+Certificate"
            }
        };

        function showCertificate() {
            const id = document.getElementById("stuID").value;
            const pass = document.getElementById("stuPass").value;
            const user = students[id];

            if (user && user.pass === pass) {
                document.getElementById("loginArea").style.display = "none";
                document.getElementById("result-display").style.display = "block";
                document.getElementById("certImage").src = user.imgUrl;
                window.scrollTo(0, 0);
            } else {
                alert("ID-ga ama Password-ka waa khalad!");
            }
        }
    </script>
</body>
</html>
